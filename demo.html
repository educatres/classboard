<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>公用便條貼白板｜展示版</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body class="board-page demo-page">
    <main id="board-app" class="board-app">
      <header class="toolbar">
        <div>
          <p class="eyebrow">免設定展示版</p>
          <h1>公用便條貼白板</h1>
        </div>
        <div class="toolbar-actions">
          <a class="ghost-btn as-link" href="./index.html">正式設定頁</a>
          <button class="primary-btn" id="add-note" type="button">新增便條貼</button>
          <button class="ghost-btn" id="reset-demo" type="button">重設展示</button>
          <span id="sync-status" class="sync-pill">本機展示模式</span>
          <span id="note-count" class="sync-pill">0 張</span>
        </div>
      </header>

      <section class="demo-banner">
        <strong>這是可直接試玩的展示頁。</strong>
        <span>資料只存在這台裝置的瀏覽器 localStorage，不會送到 Google Sheet；正式課堂使用請回到設定頁串接 Google Form / Sheet。</span>
      </section>

      <section id="board" class="board demo-board" aria-label="展示版便條貼白板">
        <div class="board-spacer" aria-hidden="true"></div>
        <div class="empty-state" id="empty-state">
          <h2>按「新增便條貼」開始試玩</h2>
          <p>你可以拖曳、縮放、雙擊編輯、換色或刪除便條貼。</p>
        </div>
      </section>
    </main>

    <template id="note-template">
      <article class="note">
        <div class="note-toolbar">
          <select class="note-color" aria-label="便條貼顏色">
            <option value="yellow">黃色</option>
            <option value="pink">粉紅</option>
            <option value="blue">藍色</option>
            <option value="green">綠色</option>
            <option value="purple">紫色</option>
            <option value="orange">橘色</option>
          </select>
          <button class="icon-btn edit-note" type="button" aria-label="編輯">編輯</button>
          <button class="icon-btn delete-note" type="button" aria-label="刪除">刪除</button>
        </div>
        <div class="note-text" tabindex="0"></div>
        <textarea class="note-editor" rows="4"></textarea>
        <div class="resize-handle" aria-hidden="true"></div>
      </article>
    </template>

    <script type="module" src="./js/demo.js"></script>
  </body>
</html>
